name: Monthly Power Price

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node monthly_avg.js

      - name: Commit CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add monthly_power_prices.csv
          git commit -m "Update monthly power prices" || exit 0
          git push
